<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="220" height="220" preserveAspectRatio="xMidYMid meet">
  <style>
    /* Animación aplicada al grupo que proporcionaste */
    #animGroup { transform-origin: 50% 50%; animation: floatMove 5s ease-in-out infinite; }
    @keyframes floatMove {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(2deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }
    /* Asegura que los trazos sean visibles sobre fondos oscuros */
    #animGroup path { stroke: #ffffff; }
  </style>

  <!-- Definición de clip-path reutilizable -->
  <defs>
    <clipPath id="clip_canciones"><rect width="200" height="200" x="0" y="0"/></clipPath>
  </defs>

  <!-- Grupo de animación exactamente como lo proporcionaste, envuelto en id para animación -->
  <g id="animGroup">

