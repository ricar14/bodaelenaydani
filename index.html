<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boda Elena y Dani</title>
  <link rel="stylesheet" href="./src/style.css">
  <link rel="stylesheet" href="./src/countdown.css">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- Añadido: Playfair Display y Allura para nombres y ampersand -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400&family=Allura&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* Evitar parpadeo: ocultar sections por defecto y mostrar solo la invitación hasta que JS actúe */
    section { display: none; }
    #invitation-card { display: flex; }
  </style>
</head>
<body>

  <script type="module" src="./src/countdown.ts"></script>

  <!-- Fondo del sobre, colocado dentro de la tarjeta más abajo (ver .invitation-box) -->

  <section id="invitation-card">
    <div id="envelope-anim" style="display:flex;">
      <video id="sobreAnimado" src="/img/invitacion_abriendose.mp4" class="envelope-image" muted preload="metadata"></video>
    </div>
  </section>
  
  <section id="nos-casamos" class="full-screen">
  <div class="hero-rect invitation-box has-seal">
    <div class="names-block">
      <img src="/img/nombre.png" alt="Elena y Dani" class="names-image" style="width:100%;height:auto;">
    </div>

    <p class="footer-text">Acompáñanos a celebrar el inicio<br>de nuestra vida juntos.</p>
  </div>
</section>

  <section id="countdown-section" class="full-screen" style="display:flex;align-items:center;justify-content:center;min-height:45vh;height:45vh;background-image:url('/img/corona.png');background-repeat:no-repeat;background-size:cover;background-position:center center;">
    <div class="count-inner"  style="display:flex;flex-direction:column;align-items:center;gap:0.6rem;padding:1rem;">
      <div class="count-grid" style="display:flex;align-items:center;margin-top:3.5rem;">
        <div class="count-item" style="text-align:center;min-width:50px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.5);">
          <div class="count-number" id="days" style="font-size:1.3rem;font-weight:600;"><span>0</span></div>
          <div class="count-label" style="font-size:0.85rem;">DÍAS</div>
        </div>
        <div class="count-item" style="text-align:center;min-width:50px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.5);">
          <div class="count-number" id="hours" style="font-size:1.3rem;font-weight:600;"><span>00</span></div>
          <div class="count-label" style="font-size:0.85rem;">HS</div>
        </div>
        <div class="count-item" style="text-align:center;min-width:50px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.5);">
          <div class="count-number" id="minutes" style="font-size:1.3rem;font-weight:600;"><span>00</span></div>
          <div class="count-label" style="font-size:0.85rem;">MIN</div>
        </div>
        <div class="count-item" style="text-align:center;min-width:50px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.5);">
          <div class="count-number" id="seconds" style="font-size:1.3rem;font-weight:600;"><span>00</span></div>
          <div class="count-label" style="font-size:0.85rem;">SEG</div>
        </div>
      </div>
    </div>
  </section>


  <section id="wedding-info" class="full-screen">
    <img src="/img/iglesia.png" alt="Acompañanos" class="names-image" style="width:80%;height:auto;">
      <div style="margin-top: 1em;">
        <a href="https://www.google.com/maps/place/Iglesia+de+San+Pedro+Apóstol/@37.835209,-0.779364,17z/data=!3m1!4b1!4m6!3m5!1s0xd6310e2e3c7e3e9:0x7e2e6e7e0e92ce5d!8m2!3d37.835209!4d-0.7767891!16s%2Fg%2F11b6h7w3w9?hl=es" target="_blank" class="btn btn-primary" style="background:#b48a78;border:none;border-radius:2em;padding:0.75em 2em;font-size:1.1em;">
          Ver ubicación
        </a>
      </div>
  </div>
  </section>

  <!-- Inserted section replicated from image.png -->
  
  <section id="confirmacion-asistencia" class="confirm-section full-screen">
    <div class="confirm-inner">
      <div class="confirm-content card-arco">
        <h2>Confirmación 
          <br>de Asistencia</h2>

        <img src="/img/silueta_sobre.png" alt="Icono de confirmación"
          style="width:32%;height:auto;display:block;margin:0.2em auto;">

        <p>Nos encantaría contar contigo en nuestra lista de invitados.</p>
        <p>Confirma tu asistencia hasta el</p>
        <p><strong id="confirmar-asistencia">1 de SEPTIEMBRE</strong></p>

        <a href="#form" class="confirm-btn">Sí, Asistiré</a>
      </div>
    </div>
  </section>

  <section id="form" class="full-screen">
    <button id="back-from-form" class="btn btn-secondary back-btn" style="border-radius:2em;padding:0.5em 1.2em;margin-bottom:1em;display:none;">Volver</button>
    <h2>RSVP</h2>
    <form id="rsvp-form">
      <label for="name">Nombre:</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Correo electrónico:</label>
      <input type="email" id="email" name="email">

      <label for="guests">Número de invitados:</label>
      <input type="number" id="guests" name="guests" min="1" required>

      <label for="allergies">Alergias:</label>
      <input type="text" id="allergies" name="allergies" placeholder="Indicar si procede">

      <label for="shoe">Nº de zapato:</label>
      <input type="number" id="shoe" name="shoe" min="20" max="50" step="0.5" placeholder="Ej: 38.5">

      <label>Autobús:</label>
      <div>
        <input type="radio" id="bus-yes" name="bus" value="si">
        <label for="bus-yes">Sí</label>
        <input type="radio" id="bus-no" name="bus" value="no" checked>
        <label for="bus-no">No</label>
      </div>

      <button type="submit">Enviar</button>
    </form>
  </section>

  <section id="foto-final" class="full-screen">
    <div class="foto-wrap">
      <img class="cabecera" src="/img/IMG-20260304-WA0021.jpg" alt="Cabecera">
      <img class="letras-overlay" id="letras-overlay" src="/img/letras.png" alt="Letras decorativas">
    </div>
  </section>

  <!-- Bootstrap Modal for alerts -->
  <div class="modal fade" id="alertModal" tabindex="-1" aria-labelledby="alertModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content" style="border-radius: 1.5rem;">
        <div class="modal-header" style="background: #fff8f0; border-bottom: none;">
          <h5 class="modal-title" id="alertModalLabel" style="font-family: 'Great Vibes', cursive; color: #b48a78; font-size: 2em;">Aviso</h5>
        </div>
        <div class="modal-body" style="font-family: 'Playfair Display', serif; color: #5a4632; font-size: 1.2em;">
          Ya se ha registrado el invitado
        </div>
        <div class="modal-footer" style="background: #fff8f0; border-top: none;">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        </div>
      </div>
    </div>
  </div>

  

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./src/main.ts" type="module"></script>
</body>
</html>
